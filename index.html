<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amanchi Events</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">A</div>
          <div>
            <strong>Amanchi</strong>
            <span>Event OS</span>
          </div>
        </div>

        <nav class="nav-list" id="navList">
          <button class="nav-item is-active" data-view="overview">
            <span class="nav-icon">H</span>
            Overview
          </button>
          <button class="nav-item" data-view="events">
            <span class="nav-icon">E</span>
            Events
          </button>
          <button class="nav-item" data-view="guests">
            <span class="nav-icon">G</span>
            Guests
          </button>
          <button class="nav-item" data-view="campaigns">
            <span class="nav-icon">@</span>
            Campaigns
          </button>
          <button class="nav-item" data-view="analytics">
            <span class="nav-icon">A</span>
            Analytics
          </button>
          <button class="nav-item" data-view="commerce">
            <span class="nav-icon">$</span>
            Commerce
          </button>
          <button class="nav-item" data-view="integrations">
            <span class="nav-icon">I</span>
            Integrations
          </button>
        </nav>

        <div class="plan-card">
          <span>Plus workspace</span>
          <strong>72% send capacity</strong>
          <div class="meter"><span style="width: 72%"></span></div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Amanchi Events</p>
            <h1 id="viewTitle">Organizer Overview</h1>
          </div>
          <div class="topbar-actions">
            <div class="searchbox">
              <span aria-hidden="true">?</span>
              <input id="globalSearch" type="search" placeholder="Search events, guests, campaigns" />
            </div>
            <button class="icon-button" id="themeToggle" aria-label="Toggle density" title="Toggle density">D</button>
            <button class="primary-button" id="createEventBtn">Create event</button>
          </div>
        </header>

        <section class="workspace" id="workspace"></section>
      </main>
    </div>

    <dialog class="modal" id="eventModal">
      <form method="dialog" class="modal-panel" id="eventForm">
        <div class="modal-header">
          <div>
            <p class="eyebrow">New event</p>
            <h2>Create an event</h2>
          </div>
          <button class="icon-button" value="cancel" aria-label="Close">x</button>
        </div>
        <div class="form-grid">
          <label>
            Event title
            <input name="title" required placeholder="Founders Breakfast Lagos" />
          </label>
          <label>
            Format
            <select name="format">
              <option>Hybrid</option>
              <option>In-person</option>
              <option>Online</option>
              <option>Multi-session</option>
            </select>
          </label>
          <label>
            Date
            <input name="date" type="date" required />
          </label>
          <label>
            Capacity
            <input name="capacity" type="number" min="10" value="120" />
          </label>
          <label>
            Ticket price
            <input name="price" type="number" min="0" value="0" />
          </label>
          <label>
            Approval
            <select name="approval">
              <option>Auto-approve</option>
              <option>Manual review</option>
              <option>Domain rules</option>
            </select>
          </label>
        </div>
        <div class="modal-footer">
          <button class="secondary-button" value="cancel">Cancel</button>
          <button class="primary-button" value="default">Publish draft</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
